<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>Nueva Etapa OS</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Global error catcher for mobile debugging (White Screen Prevention)
      window.onerror = function(message, source, lineno, colno, error) {
        const errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.background = 'red';
        errorDiv.style.color = 'white';
        errorDiv.style.padding = '20px';
        errorDiv.style.zIndex = '9999';
        errorDiv.style.fontSize = '12px';
        errorDiv.style.wordBreak = 'break-all';
        errorDiv.innerHTML = '<strong>Error Detectado:</strong><br>' + message + '<br><br>Archivo: ' + source + '<br>Línea: ' + lineno;
        document.body.appendChild(errorDiv);
        return false;
      };
      window.onunhandledrejection = function(event) {
        console.error('Unhandled rejection:', event.reason);
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
