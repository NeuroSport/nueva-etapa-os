<!doctype html>
<html lang="es" translate="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>Nueva Etapa OS</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Global error catcher for mobile debugging
      window.onerror = function(message, source, lineno, colno, error) {
        var div = document.createElement('div');
        div.style.cssText = 'position:fixed;top:0;left:0;width:100%;z-index:99999;background:#900;color:#fff;padding:15px;font-size:11px;word-break:break-all;';
        div.innerHTML = '<strong>CRITICAL ERROR:</strong> ' + message + '<br>@ ' + source + ':' + lineno + '<br><br><button onclick="location.reload(true)" style="background:white;color:black;padding:5px;border:none;border-radius:4px;">RELOAD</button>';
        document.body ? document.body.appendChild(div) : window.addEventListener('load', function(){ document.body.appendChild(div); });
        return false;
      };
      
      function forceReset() {
        if(!confirm("Esto limpiará todo el caché y reiniciará la app. ¿Continuar?")) return;
        localStorage.clear();
        sessionStorage.clear();
        if ('caches' in window) {
          caches.keys().then(function(names) {
            for (var i = 0; i < names.length; i++) caches.delete(names[i]);
          });
        }
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(var i = 0; i < registrations.length; i++) registrations[i].unregister();
          });
        }
        location.reload(true);
      }
    </script>
    <button onclick="forceReset()" style="position:fixed;bottom:80px;right:10px;z-index:9999;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,0.5);color:white;border:none;font-size:8px;display:flex;align-items:center;justify-content:center;text-align:center;">RESET<br>CACHÉ</button>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
